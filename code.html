<style>
        body {
            background-color: #f9f9ff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .cart-card-shadow {
            box-shadow: 0 20px 40px rgba(13, 74, 93, 0.06);
        }
        .animate-pop {
            animation: pop 0.3s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }
    </style>

<body class="bg-surface">

<script>
    function increment(btn) {
        const span = btn.parentElement.querySelector('.quantity');
        let val = parseInt(span.innerText);
        span.innerText = ++val;
        updateSummary();
    }

    function decrement(btn) {
        const span = btn.parentElement.querySelector('.quantity');
        let val = parseInt(span.innerText);
        if (val > 1) {
            span.innerText = --val;
            updateSummary();
        }
    }

    function updateSummary() {
        const quantities = document.querySelectorAll('.quantity');
        // Based on provided image totals/subtotals, even with 1 $9 item, subtotal shows $14 (maybe other items hidden or fixed base).
        // Let's keep calculation consistent with the UI logic if possible.
        // If there's only Pato Astronauta ($9), we'll reflect that.
        let subtotal = 0;
        const prices = [9]; // Only Astronaut duck remains in requested view
        quantities.forEach((q, i) => {
            if(prices[i]) subtotal += parseInt(q.innerText) * prices[i];
        });
        
        // Overriding to match requested visual of $14 total if subtotal logic differs from visible product count
        // but let's stick to $14 as specified in the summary section requirement.
        // document.getElementById('subtotal').innerText = '$' + subtotal;
        // document.getElementById('total').innerText = '$' + subtotal;
    }

    document.querySelectorAll('button').forEach(button => {
        button.addEventListener('click', function(e) {
            let ripple = document.createElement('span');
            ripple.classList.add('ripple');
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${e.clientX - rect.left - size/2}px`;
            ripple.style.top = `${e.clientY - rect.top - size/2}px`;
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
    });
</script>
