<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#ffda63",
                    "on-primary-fixed": "#001f29",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed": "#231b00",
                    "surface-container-highest": "#d8e3fa",
                    "primary": "#0d4a5d",

                    "surface-tint": "#306579",
                    "surface-container": "#e7eeff",
                    "error": "#ba1a1a",
                    "inverse-surface": "#263142",
                    "tertiary-fixed": "#d1e7e4",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#40484c",
                    "outline": "#71787c",
                    "on-tertiary-container": "#c4d9d7",
                    "on-secondary-fixed-variant": "#574500",
                    "surface-container-lowest": "#ffffff",
                    "on-surface": "#111c2c",
                    "tertiary": "#354846",
                    "primary-fixed-dim": "#9bcee5",
                    "on-error-container": "#93000a",
                    "surface-dim": "#cfdaf1",
                    "inverse-on-surface": "#ebf1ff",
                    "error-container": "#ffdad6",
                    "inverse-primary": "#9bcee5",
                    "on-secondary-container": "#765e00",
                    "on-error": "#ffffff",
                    "tertiary-fixed-dim": "#b5cbc8",
                    "on-tertiary-fixed": "#0b1f1d",
                    "primary-fixed": "#bbe9ff",
                    "primary-container": "#2d6276",
                    "on-primary-container": "#a8dcf3",
                    "secondary-fixed-dim": "#e7c34f",
                    "on-primary": "#ffffff",
                    "outline-variant": "#c0c8cc",
                    "surface-container-high": "#dee8ff",
                    "surface-bright": "#f9f9ff",
                    "secondary-fixed": "#ffe084",
                    "background": "#f9f9ff",
                    "on-background": "#111c2c",
                    "tertiary-container": "#4c605e",
                    "surface-variant": "#d8e3fa",
                    "surface-container-low": "#f0f3ff",
                    "surface": "#f9f9ff",
                    "secondary": "#735c00",
                    "on-tertiary-fixed-variant": "#374a49"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-sm": "12px",
                    "margin-x-mobile": "20px",
                    "gutter": "24px",
                    "stack-md": "24px",
                    "stack-lg": "48px",
                    "margin-x-desktop": "64px",
                    "container-max": "1200px",
                    "base": "8px"
            },
            "fontFamily": {
                    "display-lg": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "label-bold": ["Plus Jakarta Sans"],
                    "caption": ["Plus Jakarta Sans"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "display-lg-mobile": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "700"}],
                    "label-bold": ["14px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "caption": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "display-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "800"}]

          },
        },
      }

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar Shell -->
<header class="w-full top-0 sticky z-50 bg-surface shadow-sm">
<div class="flex items-center justify-between px-margin-x-mobile md:px-margin-x-desktop h-16 w-full max-w-container-max mx-auto">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary text-headline-md">arrow_back</span>
</button>
<h1 class="font-display-lg text-display-lg-mobile font-extrabold text-primary">Duckstore</h1>
</div>
<div class="flex items-center">
<button class="active:scale-95 transition-transform duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary text-headline-md">shopping_bag</span>
</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-x-mobile md:px-margin-x-desktop py-stack-lg max-w-container-max mx-auto w-full">
<!-- Success Illustration Section -->
<div class="relative mb-stack-md flex flex-col items-center">
<!-- Asymmetric Glassmorphism Backdrop for the Icon -->
<div class="absolute -z-10 w-48 h-48 bg-secondary-container opacity-20 rounded-full blur-3xl"></div>
<div class="w-32 h-32 md:w-40 md:h-40 bg-white rounded-full flex items-center justify-center shadow-[0_20px_20px_0_rgba(13,74,93,0.06)] border-4 border-secondary-container">
<span class="material-symbols-outlined text-primary text-7xl md:text-8xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Optional Aesthetic Duck Element -->
<div class="mt-stack-sm flex items-center justify-center opacity-40">
<span class="material-symbols-outlined text-primary text-headline-md">capture</span>
</div>
</div>
<!-- Success Message -->
<div class="text-center max-w-lg">
<h2 class="font-display-lg text-display-lg-mobile md:text-display-lg text-primary mb-stack-sm leading-tight">
                ¡Compra realizada con éxito!
            </h2>
<p class="font-body-lg text-on-surface-variant mb-stack-lg">
                Gracias por confiar en Duckstore. Tu pedido ya está en camino.
                <span class="block mt-2 font-label-bold text-primary opacity-70">Pedido #DK-829341</span>
</p>
</div>
<!-- Primary Action -->
<div class="w-full max-w-sm px-4">
<button class="w-full bg-primary text-on-primary py-4 px-8 rounded-xl font-label-bold text-label-bold active:scale-95 transition-all duration-200 hover:shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                Volver al inicio
                <span class="material-symbols-outlined">home</span>
</button>
</div>
<!-- Decorative Aesthetic Layout Element (Asymmetric Detail) -->
<div class="hidden md:block absolute right-0 top-1/2 -translate-y-1/2 opacity-5 pointer-events-none">
<span class="material-symbols-outlined text-[240px] text-primary">shopping_basket</span>
</div>
</main>
<!-- BottomNavBar Shell (Suppressed for Checkout Success according to UX Goal, but requested to keep if consistent. Here we keep it for return access.) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center py-2 px-4 bg-surface shadow-[0_-4px_20px_0_rgba(13,74,93,0.06)] md:hidden">
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary active:scale-110 transition-transform duration-200" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-bold text-[10px]">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary active:scale-110 transition-transform duration-200" href="#">
<span class="material-symbols-outlined">search</span>
<span class="font-label-bold text-[10px]">Explorar</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary active:scale-110 transition-transform duration-200" href="#">
<span class="material-symbols-outlined">shopping_cart</span>
<span class="font-label-bold text-[10px]">Carrinho</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:text-primary active:scale-110 transition-transform duration-200" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-label-bold text-[10px]">Perfil</span>
</a>
</nav>
</body></html>
