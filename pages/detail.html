<!DOCTYPE html>
<html lang="es">

<head>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

</head>

<body>
    <!-- === HEADER === -->
    <header>
        <div class="header__container">
            <!-- Logo -->
            <a class="header__logo" href="#">
                <img height=30 class="header__logo_icon" src="../assets/icons/duck_logo.png">
                <span>DuckStore</span>
            </a>

            <!-- Navigation -->
            <nav class="header__navigation">
                <ul class="navigation__list">
                    <li><a class="navigation__link" href="../index.html">Inicio</a></li>
                    <li><a class="navigation__link" href="./catalog.html">Catálogo</a></li>
                    <li><a class="navigation__link" href="./contact.html">Contactar</a></li>
                </ul>
            </nav>

            <!-- Hamberger -->
            <div class="header__hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <nav class="header__mobile_menu" id="mobileMenu">
                <a class="navigation__link" href="../index.html">Inicio</a>
                <a class="navigation__link" href="./catalog.html">Catálogo</a>
                <a class="navigation__link" href="./contact.html">Contactar</a>
            </nav>


            <!-- Cart Button -->
            <a href="./cart.html">
                <dev class="button_action button_cart">
                    <img src="../assets/icons/cart.svg" />
                    <span>Carrita</span>
                </dev>
            </a>
        </div>
        <script src="../assets/js/headerHamberger.js"></script>
    </header> 

    <!-- === MAIN CONTENT === -->
    <main>

        <section class="detail_section">
            <a class="detail__back_button" href="./catalog.html" >

            </a>
            <div class="detail__container">
                
            </div>

        </section>


    </main>


    <!-- === FOOTER === -->
    <footer>
        <div class="footer__container">
            <!-- Footer Content -->
            <div class="footer__content">
                <!-- Logo -->
                <a class="footer__logo" href="#">
                    <img height=30 class="footer__logo_icon" src="./assets/icons/duck_logo.png">
                    Duck Store
                </a>
                <p class="footer__description">Tu tienda para todo lo relacionado con los patos.</p>
                <p class="footer__copyright">&copy; 2026 Duck Store. Todos los derechos reservados.</p>
            </div>

            <div></div>
            <!-- Socials -->
            <div class="footer__socials">
                <a class="footer__social_icon" href="#">Facebook</a>
                <a class="footer__social_icon" href="#">Instagram</a>
            </div>
        </div>

    <script type="module" src="../assets/js/renderDetail.js"></script>
